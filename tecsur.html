<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AVANCE ELECTRIFICACION AGRUPACIONES SANTA CLARA Y 1 DE ENERO - TECSUR</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #38bdf8;
      --f1: #3b82f6; 
      --f2: #10b981; 
      --f3: #f59e0b; /* Alerta / Naranja */
      --critical: #ef4444; /* Crítico / Rojo */
      --ok: #22c55e; /* Óptimo / Verde */
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 1rem 2rem;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 { margin: 0; font-size: 1.1rem; font-weight: 600; color: var(--accent); }

    .main-container { padding: 1.5rem; max-width: 1800px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

    /* KPI CARDS - UNIFORMES Y DINÁMICOS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; align-items: stretch; }
    .kpi-card { 
      background: var(--card); 
      padding: 1.25rem; 
      border-radius: 12px; 
      border: 1px solid var(--line); 
      display: flex;
      flex-direction: column;
      height: 130px; 
      justify-content: flex-start;
      transition: transform 0.2s;
    }
    .kpi-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; height: 1rem; }
    .kpi-value { font-size: 1.8rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    
    .kpi-list { 
      font-size: 0.65rem; 
      margin-top: auto; 
      line-height: 1.2; 
      font-weight: 600;
      overflow-y: auto; 
      padding-top: 5px;
    }

    /* COLORES SEMÁFORO */
    .text-ok { color: var(--ok) !important; }
    .text-warn { color: var(--f3) !important; }
    .text-crit { color: var(--critical) !important; }
    
    .filter-bar { background: var(--card2); padding: 1rem; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--line); padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; outline: none; }
    
    /* GANTT */
    .gantt-container { background: var(--card); border-radius: 12px; border: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; position: relative; }
    .gantt-scroll { overflow: auto; position: relative; max-height: 600px; }
    .gantt-table { display: flex; flex-direction: column; min-width: max-content; position: relative; }
    .gantt-header { display: flex; background: var(--card2); position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--line); }
    .gantt-row { display: flex; border-bottom: 1px solid var(--line); align-items: stretch; position: relative; }
    
    .col-info { width: 420px; min-width: 420px; padding: 0.75rem 1rem; border-right: 1px solid var(--line); background: var(--card); position: sticky; left: 0; z-index: 15; }
    .col-timeline { flex-grow: 1; display: flex; position: relative; }
    .day-cell { width: 32px; min-width: 32px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted); }
    
    .bar-task { position: absolute; height: 26px; top: 10px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; cursor: pointer; z-index: 2; }
    .bar-progress { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 5px 0 0 5px; background: rgba(255,255,255,0.25); pointer-events: none; }
    .bar-label { position: relative; font-size: 0.65rem; font-weight: 700; color: #fff; z-index: 3; }
    .bar-master { height: 30px !important; top: 8px !important; border: 2px solid var(--accent) !important; background: rgba(56, 189, 248, 0.15) !important; }
    .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--critical); z-index: 10; pointer-events: none; box-shadow: 0 0 8px var(--critical); }
    
    #tooltip { 
      position: fixed; background: #020617; border: 1px solid var(--accent); 
      padding: 1rem; border-radius: 8px; z-index: 1000; pointer-events: none; 
      display: none; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); 
      font-size: 0.85rem; width: 340px; color: #fff;
    }
    .tt-title { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--line); margin-bottom: 8px; padding-bottom: 4px; text-transform: uppercase; font-size: 0.75rem; }
    .tt-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .tt-label { color: var(--muted); }
    .badge-dev { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
  </style>
</head>

<body>

  <header>
    <h1>AVANCE ELECTRIFICACION AGRUPACIONES SANTA CLARA Y 1 DE ENERO - TECSUR</h1>
    <div id="todayLabel" style="font-size: 0.85rem; font-weight: bold; color: var(--critical);"></div>
  </header>

  <div class="main-container">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Avance Real Total</div><div id="kpi-real" class="kpi-value">0%</div></div>
      <div class="kpi-card"><div class="kpi-label">Desviación del Proyecto</div><div id="kpi-desvio-gral" class="kpi-value">0 d</div></div>
      <div class="kpi-card">
        <div class="kpi-label">Tareas con Atraso</div>
        <div id="kpi-atraso-num" class="kpi-value text-crit">0</div>
        <div id="kpi-atraso-lista" class="kpi-list text-crit"></div>
      </div>
      <div class="kpi-card"><div class="kpi-label">Finalizadas</div><div id="kpi-done" class="kpi-value">0/0</div></div>
      <div class="kpi-card"><div class="kpi-label">Días al Cierre</div><div id="kpi-days" class="kpi-value">0</div></div>
    </div>

    <div class="filter-bar">
      <select id="filter-fase"><option value="">Todas las Fases</option></select>
      <select id="filter-owner"><option value="">Todos los Encargados</option></select>
      <select id="filter-estado"><option value="">Todos los Estados</option></select>
    </div>

    <div class="gantt-container">
      <div class="gantt-scroll" id="ganttScroll">
        <div class="gantt-table" id="ganttBody"></div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    const rawData = [
      { id: "R1", reporte: "R1 - OBRAS PROVISIONALES Y PRELIMINARES", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-31", fin: "2026-04-06", estado: "En progreso", avance: 0.83 },
      { id: "R2.1", reporte: "R2.1 - MONTAJE DE POSTES - MEDIA TENSIÓN", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-29", fin: "2026-03-30", estado: "En progreso", avance: 0.94 },
      { id: "R2.2", reporte: "R2.2- MONTAJE DE ARMADOS MT", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-09", fin: "2026-03-10", estado: "En progreso", avance: 0.58 },
      { id: "R2.3", reporte: "R2.3 - MONTAJE DE CONDUCTORES", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-18", fin: "2026-02-26", estado: "Terminado", avance: 1.00 },
      { id: "R2.4", reporte: "R2.4 - INSTALACION DE PUESTA A TIERRA", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-05", fin: "2026-03-14", estado: "En progreso", avance: 0.75 },
      { id: "R2.5", reporte: "R2.5 - TRABAJOS SUBTERRÁNEOS MT", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-16", fin: "2026-03-03", estado: "Terminado", avance: 1.00 },
      { id: "R3.1", reporte: "R3.1 - TRABAJOS SUBTERRANEOS BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-19", fin: "2026-03-19", estado: "No iniciado", avance: 0.00 },
      { id: "R3.2", reporte: "R3.2 - MONTAJE DE POSTES -BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-03", fin: "2026-03-22", estado: "En progreso", avance: 0.88 },
      { id: "R3.3", reporte: "R3.3 - MONTAJE DE ARMADOS BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-19", fin: "2026-03-22", estado: "En progreso", avance: 0.64 },
      { id: "R3.4", reporte: "R3.4 - MONTAJE DE CONDUCTORES BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-05", fin: "2026-03-24", estado: "No iniciado", avance: 0.00 },
      { id: "R3.5", reporte: "R3.5 - INSTALACION DE PUESTA A TIERRA BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-09", fin: "2026-03-24", estado: "En progreso", avance: 0.35 },
      { id: "R3.6", reporte: "R3.6 - INSTALACION DE EQUIPOS ALUMBRADO", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-10", fin: "2026-03-26", estado: "No iniciado", avance: 0.00 },
      { id: "R3.7", reporte: "R3.7 - INSTALACION DE EMPALMES Y CONECTORES", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-13", fin: "2026-03-26", estado: "No iniciado", avance: 0.00 },
      { id: "R3.8", reporte: "R3.8 - CONEXIÓN CAJA DISTRIBUCIÓN", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-20", fin: "2026-03-29", estado: "No iniciado", avance: 0.00 },
      { id: "R4", reporte: "R4 - PRUEBAS ELÉCTRICAS Y ENTREGA", fase: "Fase 2", owner: "TECSUR", inicio: "2026-04-08", fin: "2026-04-08", estado: "No iniciado", avance: 0.00 }
    ];

    const DAY_W = 32;
    const TODAY = new Date("2026-03-05"); 
    const MIN_CAL = new Date("2026-01-15");
    const MAX_CAL = new Date("2026-05-15");

    function calcularDesviacion(task) {
      if (task.estado === "Terminado") return 0;
      const start = new Date(task.inicio);
      const end = new Date(task.fin);
      const duracionTotal = Math.max(1, Math.ceil((end - start) / 86400000) + 1);
      let diasTranscurridos = 0;
      if (TODAY > start) diasTranscurridos = Math.ceil((TODAY - start) / 86400000);
      if (TODAY < start && task.avance === 0) return 0;
      return parseFloat((diasTranscurridos - (task.avance * duracionTotal)).toFixed(1));
    }

    function init() {
      [...new Set(rawData.map(d => d.fase))].forEach(v => document.getElementById('filter-fase').add(new Option(v, v)));
      [...new Set(rawData.map(d => d.owner))].forEach(v => document.getElementById('filter-owner').add(new Option(v, v)));
      [...new Set(rawData.map(d => d.estado))].forEach(v => document.getElementById('filter-estado').add(new Option(v, v)));
      
      document.getElementById('todayLabel').innerText = "Corte: " + TODAY.toLocaleDateString();
      document.querySelectorAll('select').forEach(s => s.addEventListener('change', render));
      render();
      
      const scrollPos = Math.ceil((TODAY - MIN_CAL)/86400000) * DAY_W;
      document.getElementById('ganttScroll').scrollLeft = scrollPos - 500;
    }

    function render() {
      const fFase = document.getElementById('filter-fase').value;
      const fOwner = document.getElementById('filter-owner').value;
      const fEstado = document.getElementById('filter-estado').value;

      const filtered = rawData.filter(d => 
        (!fFase || d.fase === fFase) && (!fOwner || d.owner === fOwner) && (!fEstado || d.estado === fEstado)
      );

      // --- AVANCE TOTAL CON COLOR DINÁMICO ---
      const totalAvance = rawData.reduce((acc, d) => acc + d.avance, 0) / rawData.length;
      const elAvance = document.getElementById('kpi-real');
      elAvance.innerText = `${(totalAvance * 100).toFixed(1)}%`;
      if(totalAvance < 0.3) elAvance.className = "kpi-value text-crit";
      else if(totalAvance < 0.7) elAvance.className = "kpi-value text-warn";
      else elAvance.className = "kpi-value text-ok";
      
      // --- DESVIACIÓN PROYECTO CON COLOR DINÁMICO ---
      const masterTask = { inicio: "2026-01-16", fin: "2026-04-09", avance: totalAvance, estado: "En progreso" };
      const masterDesv = calcularDesviacion(masterTask);
      const elDesv = document.getElementById('kpi-desvio-gral');
      elDesv.innerText = `${masterDesv > 0 ? '+' : ''}${masterDesv} d`;
      if(masterDesv <= 0) elDesv.className = "kpi-value text-ok";
      else if(masterDesv <= 2) elDesv.className = "kpi-value text-warn";
      else elDesv.className = "kpi-value text-crit";

      // --- TAREAS CON ATRASO ---
      let atrasadas = [];
      filtered.forEach(t => {
        const d = calcularDesviacion(t);
        if (d > 0.5 && t.avance < 1) {
          atrasadas.push(t.id);
        }
      });
      document.getElementById('kpi-atraso-num').innerText = atrasadas.length + (atrasadas.length === 1 ? " tarea" : " tareas");
      document.getElementById('kpi-atraso-lista').innerText = atrasadas.length > 0 ? "IDs: " + atrasadas.join(", ") : "Sin retrasos";

      document.getElementById('kpi-done').innerText = `${rawData.filter(d => d.avance >= 1).length}/${rawData.length}`;
      document.getElementById('kpi-days').innerText = Math.ceil((new Date("2026-04-09") - TODAY)/86400000);

      const body = document.getElementById('ganttBody');
      const totalDays = Math.ceil((MAX_CAL - MIN_CAL) / 86400000);

      let html = `<div class="gantt-header"><div class="col-info">Actividad / Desviación Actual</div><div class="col-timeline">`;
      for(let i=0; i<totalDays; i++) {
        let d = new Date(MIN_CAL); d.setDate(d.getDate()+i);
        html += `<div class="day-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
      }
      html += `</div></div>`;

      // FILA MAESTRA
      const mStart = new Date("2026-01-16"), mEnd = new Date("2026-04-09");
      const mLeft = Math.ceil((mStart - MIN_CAL)/86400000) * DAY_W;
      const mWidth = (Math.ceil((mEnd - mStart)/86400000) + 1) * DAY_W;
      
      html += `
        <div class="gantt-row" style="background: rgba(56, 189, 248, 0.05); border-bottom: 2px solid var(--accent);">
          <div class="col-info" style="font-weight: 800; color: var(--accent); display:flex; justify-content:space-between; align-items:center;">
            <span>PROYECTO DE ELECTRIFICACIÓN (GENERAL)</span>
            <span class="badge-dev" style="background:var(--accent)22; border:1px solid var(--accent)">MASTER</span>
          </div>
          <div class="col-timeline">
            <div class="bar-task bar-master" style="left:${mLeft}px; width:${mWidth}px"
                 onmouseenter='showTooltip(event, {reporte:"RESUMEN GENERAL", avance: ${totalAvance}, inicio:"2026-01-16", fin:"2026-04-09", owner:"TECSUR"})' onmouseleave="hideTooltip()">
              <div class="bar-progress" style="width:${totalAvance*100}%; background: var(--accent)"></div>
              <div class="bar-label">AVANCE ACUMULADO: ${(totalAvance*100).toFixed(1)}%</div>
            </div>
          </div>
        </div>`;

      filtered.forEach(task => {
        const start = new Date(task.inicio), end = new Date(task.fin);
        const left = Math.ceil((start - MIN_CAL)/86400000) * DAY_W;
        const width = (Math.ceil((end - start)/86400000) + 1) * DAY_W;
        const color = task.fase === "Fase 1" ? "var(--f1)" : "var(--f2)";
        const d = calcularDesviacion(task);
        const dCol = task.avance >= 1 ? "var(--ok)" : (d > 0.5 ? "var(--critical)" : "var(--accent)");

        html += `
          <div class="gantt-row">
            <div class="col-info" style="display:flex; justify-content:space-between; align-items:center;">
              <div style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                <div style="font-size:0.75rem; font-weight:600">${task.reporte}</div>
                <div style="font-size:0.6rem; color:var(--muted)">Encargado: ${task.owner} | Fin: ${task.fin}</div>
              </div>
              <span class="badge-dev" style="background:${dCol}22; color:${dCol}; border:1px solid ${dCol}">${task.avance >= 1 ? 'OK' : d+'d'}</span>
            </div>
            <div class="col-timeline">
              <div class="bar-task" style="left:${left}px; width:${width}px; background:${color}44; border:1px solid ${color}"
                   onmouseenter='showTooltip(event, ${JSON.stringify(task)})' onmouseleave="hideTooltip()">
                <div class="bar-progress" style="width:${task.avance*100}%; background:${color}"></div>
                <div class="bar-label">${(task.avance*100).toFixed(0)}%</div>
              </div>
            </div>
          </div>`;
      });

      const todayPos = Math.ceil((TODAY - MIN_CAL)/86400000) * DAY_W;
      html += `<div class="today-line" style="left: ${420 + todayPos}px"></div>`;
      body.innerHTML = html;
    }

    const tt = document.getElementById('tooltip');
    function showTooltip(e, task) {
      const desvio = calcularDesviacion(task);
      const startP = new Date(task.inicio);
      const endP = new Date(task.fin);
      
      let fVel = "N/A";
      if (task.avance > 0 && task.avance < 1) {
        const dTot = ((TODAY - startP) / 86400000) / task.avance;
        const proj = new Date(startP); proj.setDate(proj.getDate() + dTot);
        fVel = proj.toLocaleDateString();
      } else if (task.avance >= 1) fVel = "COMPLETADO";

      const projEndDesv = new Date(endP); 
      projEndDesv.setDate(projEndDesv.getDate() + Math.max(0, Math.ceil(desvio)));

      tt.style.display = 'block';
      tt.innerHTML = `
        <div class="tt-title">${task.reporte}</div>
        <div class="tt-row"><span class="tt-label">Inicio:</span> <b>${task.inicio}</b></div>
        <div class="tt-row"><span class="tt-label">Fin:</span> <b>${task.fin}</b></div>
        <div class="tt-row"><span class="tt-label">Encargado:</span> <b>${task.owner}</b></div>
        <div class="tt-row" style="border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px;">
          <span class="tt-label">Desviación:</span>
          <b style="color:${desvio > 0 ? 'var(--critical)' : 'var(--ok)'}">${desvio > 0 ? '+' : ''}${desvio} días</b>
        </div>
        <div class="tt-row" style="color:var(--accent)">
          <span class="tt-label" style="color:var(--accent)">Fin estimado por Desviación:</span> 
          <b>${projEndDesv.toLocaleDateString()}</b>
        </div>
        <div class="tt-row" style="margin-top:4px; padding-top:4px; border-top: 1px dotted var(--line)">
          <span class="tt-label">Fin a esta velocidad:</span> 
          <b style="color: var(--f3)">${fVel}</b>
        </div>
      `;
      moveTooltip(e);
    }

    function hideTooltip() { tt.style.display = 'none'; }
    function moveTooltip(e) {
      let x = e.clientX + 15, y = e.clientY + 15;
      if (x + 340 > window.innerWidth) x = e.clientX - 350;
      tt.style.left = x + 'px'; tt.style.top = y + 'px';
    }
    window.onmousemove = (e) => { if(tt.style.display==='block') moveTooltip(e); };

    init();
  </script>
</body>
</html>
